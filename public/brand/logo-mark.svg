<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Sitges Directorio">
  <title>Sitges Directorio</title>
  <!--
    Iconmark: pin de mapa con interior triangular evocando hojas mediterráneas
    (eco del logo verde original) + chispa-sol arriba a la derecha.
    Estilo geométrico plano, escala sin pérdida, dos tonos de marca + acento sol.
  -->
  <defs>
    <linearGradient id="pinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#2fa856"/>
      <stop offset="100%" stop-color="#19562c"/>
    </linearGradient>
  </defs>
  <!-- pin shape -->
  <path d="M32 4
           C18.7 4 8 14.4 8 27.2
           c0 14.5 16.5 28.6 22.4 33.1
           a2.6 2.6 0 0 0 3.2 0
           C39.5 55.8 56 41.7 56 27.2
           C56 14.4 45.3 4 32 4 Z"
        fill="url(#pinGrad)"/>
  <!-- inner white disc as canvas for leaves -->
  <circle cx="32" cy="26.5" r="13.5" fill="#fafafa"/>
  <!-- three leaves arranged like a stylized 'S' -->
  <path d="M20.5 21 L31 18.5 L25.5 27.5 Z" fill="#21873f"/>
  <path d="M33 22.5 L43.5 23.8 L36 32.3 Z" fill="#54c477"/>
  <path d="M22.5 30.5 L33 31.5 L27.5 35.5 Z" fill="#19562c"/>
  <!-- sun spot -->
  <circle cx="48" cy="14" r="3.2" fill="#f5b342"/>
</svg>
